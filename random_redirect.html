<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Redirect</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <script>
    const links = [
      "https://forms.yandex.ru/u/69ec8e3a49af47347add7abc/",
      "https://forms.yandex.ru/u/69ec7b8eeb61462cabe5545c/",
      "https://forms.yandex.ru/u/69ea8341eb61463ade4de00f/"
    ];

    function redirect() {
      const randomIndex = Math.floor(Math.random() * links.length);
      window.location.replace(links[randomIndex]);
    }

    window.onload = redirect;
  </script>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 50px;">
  <h2>Перенаправление...</h2>
  <p>Если ничего не произошло, обновите страницу.</p>
</body>
</html>
